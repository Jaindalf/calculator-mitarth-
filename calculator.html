<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Calculator</title>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        font-family: Arial, sans-serif;
        transition: 0.4s;
    }

    .calculator {
        width: 360px;
        background: rgba(0,0,0,0.85);
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .display {
        width: 100%;
        height: 60px;
        font-size: 2em;
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #222;
        color: #fff;
        margin-bottom: 15px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        height: 60px;
        font-size: 1.3em;
        border: none;
        border-radius: 10px;
        background: #444;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #666;
    }

    .operator { background: #ff9500; }
    .equal { background: #28a745; }
    .clear { background: #d9534f; }
    .advanced { background: #007bff; }

    .mode-toggle {
        margin-top: 15px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #f39c12;
        color: white;
        font-size: 1.1em;
        cursor: pointer;
    }

    .light {
        background: #f5f5f5;
    }

    .light .calculator {
        background: white;
        color: black;
    }

    .light .display {
        background: #eee;
        color: black;
    }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="append('/')">÷</button>
        <button onclick="append('*')">×</button>
        <button class="operator" onclick="append('-')">-</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('0')" style="grid-column: span 2;">0</button>

        <button onclick="append('.')">.</button>

        <button class="advanced" onclick="append('Math.sqrt(')">√</button>
        <button class="advanced" onclick="append('%')">%</button>
        <button class="advanced" onclick="append('**2')">x²</button>
        <button class="advanced" onclick="append('Math.sin(')">sin</button>
        <button class="advanced" onclick="append('Math.cos(')">cos</button>
        <button class="advanced" onclick="append('Math.tan(')">tan</button>
    </div>

    <button class="mode-toggle" onclick="toggleMode()">Toggle Light/Dark</button>
</div>

<script>
    const display = document.getElementById("display");

    function append(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function calculate() {
        try {
            let result = Function('"use strict";return (' + display.value + ')')();
            display.value = result;
        } catch {
            display.value = "Error";
        }
    }

    function toggleMode() {
        document.body.classList.toggle("light");
    }

    // ✅ Keyboard Support
    document.addEventListener("keydown", (e) => {
        if (!isNaN(e.key) || "+-*/.%".includes(e.key)) {
            append(e.key);
        } else if (e.key === "Enter") {
            calculate();
        } else if (e.key === "Backspace") {
            display.value = display.value.slice(0, -1);
        } else if (e.key === "Escape") {
            clearDisplay();
        }
    });
</script>

</body>
</html>
